name: Desktop release packages

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 portable zip
            platform: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: culvia-windows-x64
            artifact_path: dist/windows/culvia-*-windows-x86_64-pc-windows-msvc.zip
            checksum_path: dist/windows/culvia-*-windows-x86_64-pc-windows-msvc.zip.sha256
            evidence_path: dist/windows/culvia-*-windows-x86_64-pc-windows-msvc.zip.evidence.json
          - name: Linux x64 portable tgz
            platform: linux
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: culvia-linux-x64
            artifact_path: dist/linux/culvia-*-linux-x86_64-unknown-linux-gnu.tar.gz
            checksum_path: dist/linux/culvia-*-linux-x86_64-unknown-linux-gnu.tar.gz.sha256
            evidence_path: dist/linux/culvia-*-linux-x86_64-unknown-linux-gnu.tar.gz.evidence.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/tauri/package-lock.json

      - name: Install Rust stable
        shell: bash
        run: |
          rustup update stable
          rustup default stable

      - name: Install Linux desktop shell dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf xvfb

      - name: Show desktop release contract
        run: python tools/desktop_release_contract.py --platform ${{ matrix.platform }} --check-plan --json

      - name: Build and verify desktop package
        run: python tools/desktop_release_contract.py --platform ${{ matrix.platform }} --run --json

      - name: Upload verified desktop package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_path }}
            ${{ matrix.checksum_path }}
            ${{ matrix.evidence_path }}
          if-no-files-found: error
          retention-days: 14
