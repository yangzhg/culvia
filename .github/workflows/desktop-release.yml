name: Desktop release packages

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to build"
        required: true
        default: all
        type: choice
        options:
          - all
          - macos
          - linux
          - windows
      profile:
        description: "Runtime profile. Full bundles Python; Lite uses an app-managed runtime."
        required: true
        default: full
        type: choice
        options:
          - full
          - lite
          - all
      upload_artifacts:
        description: "Upload verified package artifacts for manual runs."
        required: true
        default: true
        type: boolean
      publish_release:
        description: "Create or update a GitHub Release. Requires a tag ref or release_tag."
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Existing tag to publish when running workflow_dispatch from a branch."
        required: false
        default: ""
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  select:
    name: Select release jobs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      upload_artifacts: ${{ steps.matrix.outputs.upload_artifacts }}
      publish_release: ${{ steps.matrix.outputs.publish_release }}
      release_ref: ${{ steps.matrix.outputs.release_ref }}

    steps:
      - name: Build selected matrix
        id: matrix
        shell: python
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
          INPUT_PLATFORM: ${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'all' }}
          INPUT_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || 'release' }}
          INPUT_UPLOAD_ARTIFACTS: ${{ github.event_name == 'workflow_dispatch' && inputs.upload_artifacts }}
          INPUT_PUBLISH_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_release }}
          INPUT_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || '' }}
        run: |
          import json
          import os
          import sys

          event_name = os.environ["EVENT_NAME"]
          ref_name = os.environ["REF_NAME"]
          ref_type = os.environ["REF_TYPE"]
          selected_platform = os.environ["INPUT_PLATFORM"] or "all"
          selected_profile = os.environ["INPUT_PROFILE"] or "full"
          requested_release_tag = os.environ["INPUT_RELEASE_TAG"].strip()
          release_ref = requested_release_tag or (ref_name if ref_type == "tag" else "")

          jobs = [
              {
                  "name": "macOS arm64 app dmg",
                  "platform": "macos",
                  "profile": "full",
                  "os": "macos-latest",
                  "arch": "arm64",
                  "artifact_name": "culvia-macos-arm64",
                  "artifact_path": "dist/macos/*.dmg",
                  "checksum_path": "dist/macos/*.dmg.sha256",
                  "evidence_path": "dist/macos/*.dmg.evidence.json",
              },
              {
                  "name": "macOS x64 app dmg",
                  "platform": "macos",
                  "profile": "full",
                  "os": "macos-15-intel",
                  "arch": "x64",
                  "artifact_name": "culvia-macos-x64",
                  "artifact_path": "dist/macos/*.dmg",
                  "checksum_path": "dist/macos/*.dmg.sha256",
                  "evidence_path": "dist/macos/*.dmg.evidence.json",
              },
              {
                  "name": "macOS Lite arm64 app dmg",
                  "platform": "macos",
                  "profile": "lite",
                  "os": "macos-latest",
                  "arch": "arm64",
                  "artifact_name": "culvia-macos-lite-arm64",
                  "artifact_path": "dist/macos-lite/*.dmg",
                  "checksum_path": "dist/macos-lite/*.dmg.sha256",
                  "evidence_path": "dist/macos-lite/*.dmg.evidence.json",
              },
              {
                  "name": "macOS Lite x64 app dmg",
                  "platform": "macos",
                  "profile": "lite",
                  "os": "macos-15-intel",
                  "arch": "x64",
                  "artifact_name": "culvia-macos-lite-x64",
                  "artifact_path": "dist/macos-lite/*.dmg",
                  "checksum_path": "dist/macos-lite/*.dmg.sha256",
                  "evidence_path": "dist/macos-lite/*.dmg.evidence.json",
              },
              {
                  "name": "Windows x64 portable zip",
                  "platform": "windows",
                  "profile": "full",
                  "os": "windows-latest",
                  "artifact_name": "culvia-windows-x64",
                  "artifact_path": "dist/windows/culvia-*-windows-x86_64-pc-windows-msvc.zip",
                  "checksum_path": "dist/windows/culvia-*-windows-x86_64-pc-windows-msvc.zip.sha256",
                  "evidence_path": "dist/windows/culvia-*-windows-x86_64-pc-windows-msvc.zip.evidence.json",
              },
              {
                  "name": "Windows Lite x64 portable zip",
                  "platform": "windows",
                  "profile": "lite",
                  "os": "windows-latest",
                  "artifact_name": "culvia-windows-lite-x64",
                  "artifact_path": "dist/windows-lite/culvia-*-windows-lite-x86_64-pc-windows-msvc.zip",
                  "checksum_path": "dist/windows-lite/culvia-*-windows-lite-x86_64-pc-windows-msvc.zip.sha256",
                  "evidence_path": "dist/windows-lite/culvia-*-windows-lite-x86_64-pc-windows-msvc.zip.evidence.json",
              },
              {
                  "name": "Linux x64 portable tgz",
                  "platform": "linux",
                  "profile": "full",
                  "os": "ubuntu-latest",
                  "artifact_name": "culvia-linux-x64",
                  "artifact_path": "dist/linux/culvia-*-linux-x86_64-unknown-linux-gnu.tar.gz",
                  "checksum_path": "dist/linux/culvia-*-linux-x86_64-unknown-linux-gnu.tar.gz.sha256",
                  "evidence_path": "dist/linux/culvia-*-linux-x86_64-unknown-linux-gnu.tar.gz.evidence.json",
              },
              {
                  "name": "Linux Lite x64 portable tgz",
                  "platform": "linux",
                  "profile": "lite",
                  "os": "ubuntu-latest",
                  "artifact_name": "culvia-linux-lite-x64",
                  "artifact_path": "dist/linux-lite/culvia-*-linux-lite-x86_64-unknown-linux-gnu.tar.gz",
                  "checksum_path": "dist/linux-lite/culvia-*-linux-lite-x86_64-unknown-linux-gnu.tar.gz.sha256",
                  "evidence_path": "dist/linux-lite/culvia-*-linux-lite-x86_64-unknown-linux-gnu.tar.gz.evidence.json",
              },
          ]
          def profile_matches(job):
              if selected_profile == "release":
                  if job["platform"] == "linux":
                      return job["profile"] == "lite"
                  return job["profile"] == "full"
              return selected_profile == "all" or selected_profile == job["profile"]

          include = [
              job
              for job in jobs
              if (selected_platform == "all" or selected_platform == job["platform"])
              and profile_matches(job)
          ]
          if not include:
              print("No release jobs matched the requested platform/profile selection.", file=sys.stderr)
              sys.exit(1)

          upload_artifacts = event_name == "push" or os.environ["INPUT_UPLOAD_ARTIFACTS"].lower() == "true"
          publish_release = event_name == "push" and ref_type == "tag"
          if event_name == "workflow_dispatch" and os.environ["INPUT_PUBLISH_RELEASE"].lower() == "true":
              if not release_ref:
                  print("publish_release requires running on a tag or passing release_tag.", file=sys.stderr)
                  sys.exit(1)
              publish_release = True
              upload_artifacts = True

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"matrix={json.dumps({'include': include}, separators=(',', ':'))}\n")
              output.write(f"upload_artifacts={'true' if upload_artifacts else 'false'}\n")
              output.write(f"publish_release={'true' if publish_release else 'false'}\n")
              output.write(f"release_ref={release_ref}\n")

  package:
    name: ${{ matrix.name }}
    needs: select
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.select.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.select.outputs.release_ref || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/tauri/package-lock.json

      - name: Select Rust stable
        shell: bash
        run: rustup default stable

      - name: Install Linux desktop shell dependencies
        if: matrix.platform == 'linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xvfb

      - name: Install macOS Python desktop dependencies
        if: matrix.platform == 'macos' && matrix.profile == 'full'
        run: python -m pip install -e '.[desktop]'

      - name: Show macOS runner architecture
        if: matrix.platform == 'macos'
        run: uname -m

      - name: Show macOS release plan
        if: matrix.platform == 'macos'
        run: python tools/build_macos_app.py --runtime-profile ${{ matrix.profile }} --clean-first --check-plan --json

      - name: Build and verify macOS package
        if: matrix.platform == 'macos'
        run: python tools/build_macos_app.py --runtime-profile ${{ matrix.profile }} --clean-first --json

      - name: Show Windows/Linux release contract
        if: matrix.platform != 'macos'
        run: python tools/desktop_release_contract.py --platform ${{ matrix.platform }} --profile ${{ matrix.profile }} --check-plan --json

      - name: Build and verify Windows/Linux package
        if: matrix.platform != 'macos'
        run: python tools/desktop_release_contract.py --platform ${{ matrix.platform }} --profile ${{ matrix.profile }} --run --json

      - name: Generate desktop package attestations
        if: needs.select.outputs.upload_artifacts == 'true'
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ matrix.artifact_path }}
            ${{ matrix.checksum_path }}
            ${{ matrix.evidence_path }}

      - name: Upload verified desktop package
        if: needs.select.outputs.upload_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_path }}
            ${{ matrix.checksum_path }}
            ${{ matrix.evidence_path }}
          if-no-files-found: error
          retention-days: 7

  source:
    name: Python wheel and source archive
    needs: select
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.select.outputs.release_ref || github.ref }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install release build dependencies
        run: python -m pip install -e '.[release]'

      - name: Build and verify Python distributions
        run: python tools/release_smoke.py --build --wheelhouse dist/python --build-sdist --dist-dir dist/python --install --twine-check --strict

      - name: Generate Python distribution attestations
        if: needs.select.outputs.upload_artifacts == 'true'
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/python/culvia-*.whl
            dist/python/culvia-*.tar.gz

      - name: Upload verified Python distributions
        if: needs.select.outputs.upload_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: culvia-python-source
          path: |
            dist/python/culvia-*.whl
            dist/python/culvia-*.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs:
      - select
      - package
      - source
    if: needs.select.outputs.publish_release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish assets to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.select.outputs.release_ref }}
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG}" ]; then
            echo "release_ref is empty; refusing to publish." >&2
            exit 1
          fi

          cat > release-notes.md <<EOF
          Automated Culvia desktop and source release for ${RELEASE_TAG}.

          Assets include verified desktop packages, SHA-256 checksum files, release evidence manifests, a Python wheel, and a Python source distribution.

          The Linux desktop asset uses the Lite runtime profile to stay within GitHub Release asset size limits. It does not bundle the Python/ML runtime; on first launch it uses Python 3.11+ to create an app-managed runtime environment.

          GitHub Artifact Attestations are generated for release assets. After downloading an asset, verify its provenance with:

          \`\`\`bash
          gh attestation verify <downloaded-asset> --repo ${GITHUB_REPOSITORY}
          \`\`\`
          EOF

          if gh release view --repo "${GITHUB_REPOSITORY}" "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit --repo "${GITHUB_REPOSITORY}" "${RELEASE_TAG}" --title "Culvia ${RELEASE_TAG}" --notes-file release-notes.md
          else
            gh release create --repo "${GITHUB_REPOSITORY}" "${RELEASE_TAG}" --verify-tag --title "Culvia ${RELEASE_TAG}" --notes-file release-notes.md
          fi

          mapfile -d '' assets < <(find release-assets -type f -print0 | sort -z)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi
          gh release upload --repo "${GITHUB_REPOSITORY}" "${RELEASE_TAG}" "${assets[@]}" --clobber
