<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Culvia</title>
    <style>
      :root {
        color-scheme: dark;
        --paper: #f3f6f7;
        --cyan: #65d8c9;
        --blue: #4da7ff;
        --gold: #ffb23e;
        --ink: #12151a;
        --muted: rgba(243, 246, 247, 0.64);
      }
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #101217;
        color: var(--paper);
        user-select: none;
      }
      #stage {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.10);
        border-radius: 24px;
        background:
          radial-gradient(circle at 26% 36%, rgba(77, 167, 255, 0.12), transparent 48%),
          linear-gradient(150deg, #111317 0%, #1d2127 58%, #2b3036 100%);
      }
      #content {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 224px minmax(0, 1fr);
        height: 100%;
      }
      #visual {
        position: relative;
        display: grid;
        place-items: center;
        padding-left: 34px;
      }
      #mark {
        position: relative;
        z-index: 2;
        width: 138px;
        height: 138px;
      }
      #copy {
        position: relative;
        display: grid;
        align-content: center;
        padding: 58px 54px 116px 2px;
      }
      #kicker {
        display: inline-flex;
        width: max-content;
        padding: 6px 10px;
        border: 1px solid rgba(243, 246, 247, 0.22);
        border-radius: 999px;
        color: rgba(243, 246, 247, 0.72);
        background: rgba(243, 246, 247, 0.06);
        font-size: 11px;
        font-weight: 760;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      #title {
        margin-top: 18px;
        font-size: 52px;
        line-height: 0.96;
        font-weight: 820;
        letter-spacing: 0;
      }
      #subtitle {
        max-width: 330px;
        margin-top: 14px;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
        font-weight: 560;
      }
      #footer {
        position: absolute;
        z-index: 2;
        left: 34px;
        right: 34px;
        bottom: 30px;
        display: grid;
        gap: 14px;
      }
      #status-row {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 18px;
      }
      #status {
        color: rgba(243, 246, 247, 0.92);
        font-size: 14px;
        font-weight: 720;
      }
      #hint {
        color: rgba(243, 246, 247, 0.56);
        font-size: 12px;
        font-weight: 620;
      }
      #track {
        height: 4px;
        border-radius: 999px;
        background: rgba(243, 246, 247, 0.14);
        overflow: hidden;
      }
      #bar {
        display: block;
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--cyan), var(--blue));
        transition: width 280ms ease;
      }
      #phases {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
      }
      .phase {
        display: flex;
        align-items: center;
        gap: 7px;
        color: rgba(243, 246, 247, 0.38);
        font-size: 11px;
        font-weight: 690;
      }
      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        border: 1px solid currentColor;
        background: transparent;
        box-shadow: none;
      }
      .phase.is-active,
      .phase.is-done {
        color: rgba(243, 246, 247, 0.86);
      }
      .phase.is-active .dot {
        color: var(--cyan);
        background: currentColor;
      }
      .phase.is-done .dot {
        color: var(--gold);
        background: currentColor;
      }
      #stage[data-state="error"] {
        border-color: rgba(255, 178, 62, 0.34);
        background:
          radial-gradient(circle at 26% 36%, rgba(255, 178, 62, 0.14), transparent 48%),
          linear-gradient(150deg, #17110f 0%, #241917 58%, #111010 100%);
      }
      #stage[data-state="error"] #bar {
        background: linear-gradient(90deg, #ff8d6b, var(--gold));
      }
      #stage[data-state="error"] #hint {
        color: rgba(255, 216, 189, 0.72);
      }
    </style>
  </head>
  <body>
    <div id="stage" data-state="loading">
      <div id="content">
        <div id="visual" aria-hidden="true">
          <svg id="mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Culvia">
            <title>Culvia</title>
            <defs>
              <linearGradient id="culvia-ring" x1="14" y1="50" x2="50" y2="14" gradientUnits="userSpaceOnUse">
                <stop stop-color="#65d8c9"/>
                <stop offset="1" stop-color="#4da7ff"/>
              </linearGradient>
            </defs>
            <circle cx="32" cy="32" r="20.5" fill="none" stroke="url(#culvia-ring)" stroke-width="4.2"/>
            <path d="M20.1 25 A14 14 0 0 1 27.2 18.8" fill="none" stroke="#dff6f4" stroke-width="2.8" stroke-linecap="round" opacity=".8"/>
            <path d="M22.5 32 30 39.5 42 25" fill="none" stroke="#ffb23e" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <main id="copy">
          <div id="kicker">Photo Curation Studio</div>
          <div id="title">Culvia</div>
          <div id="subtitle">Curate the frame, preserve the work.</div>
        </main>
      </div>
      <div id="footer">
        <div id="status-row">
          <div id="status">Starting</div>
          <div id="hint">Preparing the workspace</div>
        </div>
        <div id="track"><span id="bar"></span></div>
        <div id="phases" aria-hidden="true">
          <div class="phase" data-phase="1"><span class="dot"></span><span>Prepare</span></div>
          <div class="phase" data-phase="2"><span class="dot"></span><span>Service</span></div>
          <div class="phase" data-phase="3"><span class="dot"></span><span>Data</span></div>
          <div class="phase" data-phase="4"><span class="dot"></span><span>Interface</span></div>
        </div>
      </div>
    </div>
    <script>
      window.CulviaSplash = {
        setStatus: (payload) => {
          const status = typeof payload.status === "string" ? payload.status : "Ready";
          const hint = typeof payload.hint === "string" ? payload.hint : "Preparing the workspace";
          const isError = payload.error === true;
          const step = Number(payload.step) || 0;
          const total = Number(payload.total) || 4;
          const safeStep = Math.min(Math.max(step, 0), total);
          const safeTotal = Math.max(total, 1);
          const percent = isError ? 100 : Math.round((safeStep / safeTotal) * 100);
          const stageEl = document.getElementById("stage");
          const statusEl = document.getElementById("status");
          const hintEl = document.getElementById("hint");
          const barEl = document.getElementById("bar");
          const phases = Array.from(document.querySelectorAll(".phase"));
          if (stageEl) stageEl.dataset.state = isError ? "error" : "loading";
          if (statusEl) statusEl.textContent = status;
          if (hintEl) hintEl.textContent = hint;
          if (barEl) barEl.style.width = `${percent}%`;
          phases.forEach((phase) => {
            const phaseStep = Number(phase.dataset.phase) || 0;
            phase.classList.toggle("is-done", !isError && safeStep >= phaseStep);
            phase.classList.toggle("is-active", !isError && safeStep + 1 === phaseStep);
          });
        }
      };
      window.CulviaSplash.setStatus({status: "Starting", step: 0, total: 4});
    </script>
  </body>
</html>
