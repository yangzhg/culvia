<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Culvia animated scan icon">
  <title>Culvia animated scan icon</title>
  <defs>
    <linearGradient id="scan-bg" x1="10" y1="58" x2="56" y2="8" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111317"/>
      <stop offset=".58" stop-color="#1d2127"/>
      <stop offset="1" stop-color="#2b3036"/>
    </linearGradient>
    <linearGradient id="scan-ring" x1="14" y1="50" x2="50" y2="14" gradientUnits="userSpaceOnUse">
      <stop stop-color="#65d8c9"/>
      <stop offset="1" stop-color="#4da7ff"/>
    </linearGradient>
    <linearGradient id="scan-sweep" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#65d8c9" stop-opacity="0"/>
      <stop offset=".5" stop-color="#ffffff" stop-opacity=".72"/>
      <stop offset="1" stop-color="#ffb23e" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="scan-clip">
      <rect width="64" height="64" rx="16"/>
    </clipPath>
    <filter id="scan-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .sweep { animation: scan-pass 2.2s ease-in-out infinite; }
      .ring { animation: ring-flash 2.2s ease-in-out infinite; }
      .tick-a { animation: tick-flash 2.2s ease-in-out infinite; }
      .tick-b { animation: tick-flash 2.2s ease-in-out .16s infinite; }
      .tick-c { animation: tick-flash 2.2s ease-in-out .32s infinite; }
      @keyframes scan-pass {
        0% { transform: translateX(-46px); opacity: 0; }
        18% { opacity: .9; }
        68% { opacity: .9; }
        100% { transform: translateX(76px); opacity: 0; }
      }
      @keyframes ring-flash {
        0%, 100% { opacity: .82; }
        45% { opacity: 1; }
      }
      @keyframes tick-flash {
        0%, 20%, 100% { opacity: .18; transform: scale(.92); }
        48% { opacity: 1; transform: scale(1); }
      }
      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; }
        .sweep { opacity: .35; transform: translateX(0); }
      }
    </style>
  </defs>
  <rect width="64" height="64" rx="16" fill="url(#scan-bg)"/>
  <g clip-path="url(#scan-clip)">
    <rect class="sweep" x="0" y="-12" width="18" height="88" fill="url(#scan-sweep)" opacity=".9" transform="translateX(-46) rotate(16 32 32)" filter="url(#scan-glow)"/>
  </g>
  <circle class="ring" cx="32" cy="32" r="20.5" fill="none" stroke="url(#scan-ring)" stroke-width="4.2" filter="url(#scan-glow)"/>
  <path d="M20.1 25 A14 14 0 0 1 27.2 18.8" fill="none" stroke="#dff6f4" stroke-width="2.8" stroke-linecap="round" opacity=".8"/>
  <path d="M22.5 32 30 39.5 42 25" fill="none" stroke="#ffb23e" stroke-width="4.6" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#dff6f4" filter="url(#scan-glow)">
    <circle class="tick-a" cx="22" cy="46" r="1.3"/>
    <circle class="tick-b" cx="32" cy="49.5" r="1.3"/>
    <circle class="tick-c" cx="42" cy="46" r="1.3"/>
  </g>
</svg>
